<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>K-Doc Talk</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--nv:#282559;--bl:#1368B2;--or:#F09700;--w:#fff;--bg:#F7F8FC;--g1:#F0F1F5;--g3:#D1D3DB;--g5:#6B7280;--g7:#374151;--rd:#EF4444}
html,body{height:100%;overflow:hidden;font-family:'Montserrat',system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
.scr{display:none;height:100dvh;flex-direction:column}.scr.on{display:flex}

/* Entry */
.ent{background:linear-gradient(165deg,var(--nv),#1a1850 50%,var(--bl));align-items:center;justify-content:center;padding:24px}
.ent-logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--bl),var(--or));display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:28px}
.ent h1{color:#fff;font-size:30px;font-weight:800;margin-bottom:4px}.dot{color:var(--or)}
.ent .sub{color:rgba(255,255,255,.5);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:48px}
.ent .prompt{color:rgba(255,255,255,.8);font-size:15px;margin-bottom:20px}
.lg{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:320px}
.lb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:22px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .15s}
.lb:active{background:rgba(255,255,255,.2);transform:scale(.97)}
.lb .fl{font-size:36px}.lb .nm{color:#fff;font-size:16px;font-weight:600}
.ent-ft{margin-top:48px;opacity:.35;color:#fff;font-size:12px}

/* Chat */
.hd{background:var(--nv);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-logo{color:#fff;font-size:16px;font-weight:700}
.hd-badge{background:rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;font-size:13px;color:#fff;display:flex;align-items:center;gap:4px}
.hd-btn{background:rgba(255,255,255,.1);border:none;border-radius:8px;padding:6px 10px;cursor:pointer;color:#fff;font-size:16px}

.chat{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:.35;padding:40px;text-align:center}
.empty .ei{font-size:48px}.empty .et{font-size:14px;color:var(--g5);line-height:1.7;white-space:pre-line}

.m{display:flex;flex-direction:column;max-width:85%}
.m.d{align-self:flex-start}.m.p{align-self:flex-end;align-items:flex-end}
.mw{font-size:11px;font-weight:600;color:var(--g5);margin-bottom:3px;padding:0 4px}
.mb{padding:12px 16px;width:100%;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.m.d .mb{background:#fff;border-radius:4px 16px 16px 16px}
.m.p .mb{background:#E8F0FE;border-radius:16px 4px 16px 16px}
.mo{font-weight:500;color:var(--g7);line-height:1.6}
.ml{height:1px;background:#E5E7EB;margin:8px 0}
.mt{font-weight:700;line-height:1.6}
.m.d .mt{color:var(--bl)}.m.p .mt{color:var(--nv)}
.mf{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.mf .ti{font-size:10px;color:#9CA3AF}
.mf .sp{background:rgba(19,104,178,.08);border:none;cursor:pointer;border-radius:8px;padding:4px 10px;font-size:13px}
.dw{background:rgba(255,152,0,.08);border:1px solid rgba(255,152,0,.3);border-radius:10px;padding:8px 12px;margin-top:6px;font-size:11px;color:#E65100;line-height:1.5}

.sb{padding:10px 20px;border-radius:16px;background:rgba(19,104,178,.06);align-self:center;text-align:center;max-width:90%}
.sb .si{font-size:13px;color:var(--bl);font-weight:600}

.rb{background:linear-gradient(90deg,rgba(19,104,178,.04),rgba(240,151,0,.04));padding:8px 0;display:flex;justify-content:center;align-items:center;gap:8px;flex-shrink:0}
.rd{width:10px;height:10px;border-radius:50%;background:var(--rd);animation:rp 1.2s infinite}
.rb span{font-size:13px;font-weight:600;color:var(--g7)}

/* Quick Phrases */
.qp{display:none;flex-shrink:0;background:#fff;border-top:1px solid #E5E7EB;max-height:42vh;flex-direction:column}
.qp.on{display:flex}
.qt{display:flex;overflow-x:auto;gap:4px;padding:8px 12px;flex-shrink:0;border-bottom:1px solid var(--g1)}
.qt::-webkit-scrollbar{display:none}
.qc{padding:6px 14px;border-radius:16px;border:1px solid var(--g3);background:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--g7)}
.qc.on{background:var(--nv);color:#fff;border-color:var(--nv)}
.ql{flex:1;overflow-y:auto;padding:8px 12px;display:flex;flex-direction:column;gap:6px}
.qi{padding:12px 14px;border:1px solid var(--g1);border-radius:12px;cursor:pointer;text-align:left;background:#fff;font-family:inherit;line-height:1.5;transition:all .1s}
.qi:active{background:rgba(19,104,178,.06);transform:scale(.98)}
.qi .qk{font-size:14px;font-weight:600;color:var(--g7)}
.qi .qv{font-size:13px;color:var(--bl);margin-top:3px}

/* Bottom */
.bt{flex-shrink:0;background:#fff;border-top:1px solid #E5E7EB;padding:8px 16px 28px}
.btr{display:flex;gap:8px;margin-bottom:8px;justify-content:center}
.btr button{border:none;border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.qb{background:var(--or);color:#fff}.qb.on{background:var(--nv)}
.mb2{background:none;border:1px solid var(--g3)!important;color:var(--g5)}

.mr{display:flex;justify-content:center;gap:16px}
.mc{flex:1;max-width:160px;padding:18px 12px;border-radius:16px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .15s;font-family:inherit}
.mc:active{transform:scale(.96)}
.mc.dc{background:var(--nv)}.mc.pc{background:var(--bl)}
.mc.ra{border-color:var(--rd)!important;background:rgba(239,68,68,.06)!important}
.mc.off{opacity:.3;pointer-events:none}
.mc .mi{font-size:28px}
.mc .ml2{font-size:14px;font-weight:700;color:#fff}
.mc .ms{font-size:10px;color:rgba(255,255,255,.5)}
.mc.ra .ml2,.mc.ra .ms{color:var(--rd)}

.ta{display:flex;flex-direction:column;gap:8px}
.ta input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid var(--g3);font-size:15px;outline:none;font-family:inherit}
.ta input:focus{border-color:var(--bl)}
.tw{display:flex;gap:8px}
.tw button{flex:1;padding:14px;border-radius:12px;border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
.tw button:disabled{opacity:.4;cursor:not-allowed}
.td{background:var(--nv)}.tp{background:var(--bl)}

/* Settings */
.sh{background:var(--nv);padding:16px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.sh .bk{background:none;border:none;color:#fff;font-size:22px;cursor:pointer}
.sh .tt{color:#fff;font-size:17px;font-weight:700}
.sy{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.sc{background:#fff;border-radius:16px;padding:20px}
.sl{font-size:12px;font-weight:700;color:var(--g5);margin-bottom:12px;text-transform:uppercase}
.or{display:flex;gap:8px}
.ob{flex:1;padding:14px 12px;border-radius:12px;cursor:pointer;text-align:center;border:1px solid var(--g3);background:#fff;font-family:inherit}
.ob.s{border:2px solid var(--bl);background:rgba(19,104,178,.06)}
.ob .o1{font-size:14px;font-weight:600}
.lr{display:flex;justify-content:space-between;align-items:center}
.cb{padding:16px;border-radius:16px;border:1px solid var(--g3);background:#fff;cursor:pointer;font-size:14px;font-weight:600;width:100%;font-family:inherit}

@keyframes rp{0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
</style>
</head>
<body>

<!-- ENTRY -->
<div id="S0" class="scr ent on">
  <div class="ent-logo">🎙</div>
  <h1>K-Doc<span class="dot">.</span>Talk</h1>
  <div class="sub">AI Medical Interpreter</div>
  <div class="prompt">Select your language</div>
  <div class="lg">
    <button class="lb" onclick="go('zh-TW','zh-TW','中文','🇹🇼','繁體中文')"><span class="fl">🇹🇼</span><span class="nm">繁體中文</span></button>
    <button class="lb" onclick="go('ja','ja-JP','日本語','🇯🇵','日本語')"><span class="fl">🇯🇵</span><span class="nm">日本語</span></button>
    <button class="lb" onclick="go('en','en-US','English','🇺🇸','English')"><span class="fl">🇺🇸</span><span class="nm">English</span></button>
    <button class="lb" onclick="go('zh-CN','zh-CN','简体中文','🇨🇳','简体中文')"><span class="fl">🇨🇳</span><span class="nm">简体中文</span></button>
  </div>
  <div class="ent-ft">powered by K‑DocFinder</div>
</div>

<!-- CHAT -->
<div id="S1" class="scr">
  <div class="hd">
    <div class="hd-l">
      <span class="hd-logo">K-Doc<span class="dot">.</span>Talk</span>
      <span class="hd-badge"><span id="hf"></span><span style="opacity:.5;font-size:11px">⇄</span>🇰🇷</span>
    </div>
    <button class="hd-btn" onclick="sw('S2')">⚙️</button>
  </div>
  <div class="chat" id="CA">
    <div class="empty" id="EM">
      <div class="ei">🎙</div>
      <div class="et" id="ET">마이크 버튼을 탭하세요\nTap a mic button to start</div>
    </div>
  </div>
  <div class="qp" id="QP">
    <div class="qt" id="QT"></div>
    <div class="ql" id="QL"></div>
  </div>
  <div id="RB" class="rb" style="display:none"><div class="rd"></div><span id="RL">듣고 있습니다...</span></div>
  <div class="bt">
    <div class="btr">
      <button class="qb" id="QB" onclick="toggleQP()">💬 자주 쓰는 문장</button>
      <button class="mb2" id="MB" onclick="toggleMode()">⌨️ 텍스트</button>
    </div>
    <div id="VU" class="mr">
      <button class="mc dc" id="MD" onclick="toggleRec('doctor')"><span class="mi">🎤</span><span class="ml2">한국어</span><span class="ms">Doctor</span></button>
      <button class="mc pc" id="MP" onclick="toggleRec('patient')"><span class="mi">🎤</span><span class="ml2" id="PL">中文</span><span class="ms">Patient</span></button>
    </div>
    <div id="TU" class="ta" style="display:none">
      <input id="TI" placeholder="텍스트 입력 / Type here...">
      <div class="tw">
        <button class="td" onclick="sendText('doctor')">🩺 한국어</button>
        <button class="tp" onclick="sendText('patient')" id="TB">👤 中文</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div id="S2" class="scr" style="background:var(--bg)">
  <div class="sh"><button class="bk" onclick="sw('S1')">←</button><span class="tt">Settings</span></div>
  <div class="sy">
    <div class="sc">
      <div class="sl">Doctor Voice / 의사 음성</div>
      <div class="or">
        <button class="ob s" id="DF" onclick="setV('doc','f')"><div class="o1">👩 여성</div></button>
        <button class="ob" id="DM" onclick="setV('doc','m')"><div class="o1">👨 남성</div></button>
      </div>
    </div>
    <div class="sc">
      <div class="sl">Patient Voice / 환자 음성</div>
      <div class="or">
        <button class="ob s" id="PF" onclick="setV('pat','f')"><div class="o1">👩 여성</div></button>
        <button class="ob" id="PM" onclick="setV('pat','m')"><div class="o1">👨 남성</div></button>
      </div>
    </div>
    <div class="sc">
      <div class="sl">Text Size / 글자 크기</div>
      <div class="or">
        <button class="ob" id="FS" onclick="setF('s')" style="font-size:13px;font-weight:700">A</button>
        <button class="ob s" id="FM" onclick="setF('m')" style="font-size:16px;font-weight:700">A</button>
        <button class="ob" id="FL" onclick="setF('l')" style="font-size:20px;font-weight:700">A</button>
      </div>
    </div>
    <div class="sc">
      <div class="sl">Language / 언어</div>
      <div class="lr"><span id="SL" style="font-size:16px"></span><button class="ob" onclick="sw('S0')" style="padding:8px 16px;font-size:13px">Change</button></div>
    </div>
    <button class="cb" id="CP" onclick="copyAll()">📋 대화 내역 복사 / Copy conversation</button>
  </div>
</div>

<script>
// ===== QUICK PHRASES =====

function matchTerms(text, srcLang) {
  var key = {ko:'ko',en:'en',ja:'ja','zh-CN':'cn','zh-TW':'tw'}[srcLang] || 'ko';
  var lower = text.toLowerCase();
  var matched = [];
  for (var i = 0; i < DICT.length && matched.length < 8; i++) {
    var term = DICT[i][key];
    if (!term) continue;
    if (lower.indexOf(term.toLowerCase()) !== -1) matched.push(DICT[i]);
  }
  return matched;
}

// ===== STATE =====
var L={code:'',stt:'',label:'',flag:'',name:''};
var vgDoc='f',vgPat='f',fs='m',mode='v',msgs=[],log=[],rec=null,busy=false,speaking=false,qpOn=false,qpCat='접수';

// ===== SCREENS =====
function sw(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});document.getElementById(id).classList.add('on');if(id==='S2')document.getElementById('SL').textContent=L.flag+' '+L.name}
function go(c,s,l,f,n){L={code:c,stt:s,label:l,flag:f,name:n};msgs=[];log=[];document.getElementById('hf').textContent=f;document.getElementById('PL').textContent=l;document.getElementById('TB').textContent='👤 '+l;render();sw('S1');reqMic()}

// ===== MIC PERMISSION =====
async function reqMic(){try{var s=await navigator.mediaDevices.getUserMedia({audio:true});s.getTracks().forEach(function(t){t.stop()})}catch(e){}}

// ===== TTS INIT =====
// Google Cloud TTS - no browser initialization needed

// ===== TTS (Google Cloud) =====
var audioEl = new Audio();

function speak(text, lc, speakerRole) {
  if (!text) return;
  if (rec) { stopRec() }
  audioEl.pause();
  speaking = true; updMic();

  // Determine gender based on who needs to HEAR (target = opposite speaker)
  var gender = speakerRole === 'doctor' ? vgPat : vgDoc;

  fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text: text, lang: lc, gender: gender })
  })
  .then(function(r) { return r.json() })
  .then(function(data) {
    if (data.audio) {
      audioEl.src = 'data:audio/mp3;base64,' + data.audio;
      audioEl.onended = function() { speaking = false; updMic() };
      audioEl.onerror = function() { speaking = false; updMic() };
      audioEl.play().catch(function() { speaking = false; updMic() });
    } else {
      speaking = false; updMic();
    }
  })
  .catch(function() { speaking = false; updMic() });

  // Fallback reset
  setTimeout(function() { if (speaking) { speaking = false; updMic() } }, 12000);
}

// ===== RENDER =====
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function esc4(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}
function render(){
  var a=document.getElementById('CA'),e=document.getElementById('EM');
  Array.from(a.children).forEach(function(c){if(c!==e)a.removeChild(c)});
  if(!msgs.length){e.style.display='flex';return}e.style.display='none';
  var sc=fs==='s'?.85:fs==='l'?1.2:1;
  msgs.forEach(function(m){
    var d=m.speaker==='doctor',div=document.createElement('div');
    div.className='m '+(d?'d':'p');
    var warn=m.warn?'<div class="dw">⚠️ 의료진 확인이 필요한 내용입니다. 최종 판단은 담당 의료진에게 확인해 주세요.</div>':'';
    div.innerHTML='<div class="mw">'+(d?'🩺 Doctor':'👤 '+L.label)+'</div><div class="mb"><div class="mo" style="font-size:'+(14*sc)+'px">'+esc(m.original)+'</div><div class="ml"></div><div class="mt" style="font-size:'+(15*sc)+'px">'+esc(m.translated)+'</div>'+warn+'<div class="mf"><span class="ti">'+m.time+'</span><button class="sp" onclick="speak(\''+esc4(m.translated)+'\',\''+m.tgt+'\',\''+m.speaker+'\')">🔊</button></div></div>';
    a.appendChild(div);
  });
  a.scrollTop=a.scrollHeight;
}

function addSt(h){rmSt();var a=document.getElementById('CA'),d=document.createElement('div');d.className='sb';d.id='ST';d.innerHTML=h;a.appendChild(d);a.scrollTop=a.scrollHeight}
function rmSt(){var e=document.getElementById('ST');if(e)e.remove()}

// ===== QUICK PHRASES =====
function toggleQP(){
  qpOn=!qpOn;
  document.getElementById('QP').classList.toggle('on',qpOn);
  document.getElementById('QB').classList.toggle('on',qpOn);
  if(qpOn)renderQP();
}
function switchCat(c){
  qpCat=c;
  document.querySelectorAll('.qc').forEach(function(b){b.classList.toggle('on',b.dataset.c===c)});
  renderQP();
}
function renderQP(){
  // Tabs
  var qt=document.getElementById('QT');
  if(!qt.children.length){
    var cats=['접수','상담','진료','결제','주의사항','응급'];
    var labels=['접수','상담','진료','결제','주의','🚨응급'];
    cats.forEach(function(c,i){
      var b=document.createElement('button');b.className='qc'+(c===qpCat?' on':'');b.dataset.c=c;b.textContent=labels[i];b.onclick=function(){switchCat(c)};qt.appendChild(b);
    });
  }
  // List
  var ql=document.getElementById('QL');ql.innerHTML='';
  var lk={en:'en',ja:'ja','zh-CN':'zhCN','zh-TW':'zhTW'}[L.code]||'en';
  var cat=QP.find(function(c){return c.category===qpCat});
  if(!cat)return;
  cat.phrases.forEach(function(p){
    var b=document.createElement('button');b.className='qi';
    b.innerHTML='<div class="qk">'+esc(p.ko)+'</div><div class="qv">'+esc(p[lk]||p.en)+'</div>';
    b.onclick=function(){useQP(p,lk)};ql.appendChild(b);
  });
}
function useQP(p,lk){
  var tr=p[lk]||p.en;
  var now=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',hour12:false});
  var msg={speaker:'doctor',original:p.ko,translated:tr,time:now,src:'ko',tgt:L.code,warn:p.doctorCheckRequired};
  msgs.push(msg);log.push(msg);render();
  speak(tr,L.code,'doctor');
  toggleQP();
}

// ===== STT =====
var recognition=null;
function toggleRec(who){if(busy||speaking)return;if(rec===who){stopRec();return}if(rec)return;startRec(who)}
function startRec(who){
  // Stop TTS first
  if(window.speechSynthesis){speechSynthesis.cancel();speaking=false}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addSt('<div class="si">⚠️ 음성 미지원</div>');return}
  var r=new SR();r.lang=who==='doctor'?'ko-KR':L.stt;r.interimResults=true;r.continuous=false;
  var ft='',st=null;
  r.onstart=function(){rec=who;updMic();document.getElementById('RB').style.display='flex';document.getElementById('RL').textContent=who==='doctor'?'듣고 있습니다... 탭하여 중지':'Listening... Tap to stop';document.getElementById('EM').style.display='none'};
  r.onresult=function(e){var im='';ft='';for(var i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)ft+=e.results[i][0].transcript;else im+=e.results[i][0].transcript}addSt('<div class="si" style="font-style:italic;color:var(--g7)">'+esc(im||ft)+'</div>');if(st)clearTimeout(st);if(!ft)st=setTimeout(function(){r.stop()},2500)};
  r.onerror=function(e){rec=null;updMic();document.getElementById('RB').style.display='none';rmSt();if(e.error==='not-allowed')addSt('<div class="si">⚠️ 마이크 권한을 허용해주세요</div>')};
  r.onend=function(){rec=null;updMic();document.getElementById('RB').style.display='none';if(st)clearTimeout(st);rmSt();if(ft.trim())translate(ft.trim(),who)};
  recognition=r;try{r.start()}catch(e){}
}
function stopRec(){if(recognition)try{recognition.stop()}catch(e){}}
function updMic(){
  var d=document.getElementById('MD'),p=document.getElementById('MP'),qb=document.getElementById('QB');
  d.className='mc dc';p.className='mc pc';d.querySelector('.mi').textContent='🎤';p.querySelector('.mi').textContent='🎤';d.querySelector('.ms').textContent='Doctor';p.querySelector('.ms').textContent='Patient';
  // Quick phrases: 의사 전용
  qb.disabled=false;qb.style.opacity='1';
  if(rec==='doctor'){d.className='mc dc ra';p.className='mc pc off';d.querySelector('.mi').textContent='⏹️';d.querySelector('.ms').textContent='탭하여 중지'}
  else if(rec==='patient'){
    p.className='mc pc ra';d.className='mc dc off';p.querySelector('.mi').textContent='⏹️';p.querySelector('.ms').textContent='Tap to stop';
    // 환자 녹음 중 → 자주 쓰는 문장 비활성화+닫기
    qb.disabled=true;qb.style.opacity='0.3';
    if(qpOn)toggleQP();
  }
  if(busy||speaking){d.className='mc dc off';p.className='mc pc off';qb.disabled=true;qb.style.opacity='0.3'}
}

// ===== TRANSLATE =====
async function translate(text,who){
  busy=true;updMic();addSt('<div class="si">⏳ 번역 중...</div>');
  var src=who==='doctor'?'ko':L.code,tgt=who==='doctor'?L.code:'ko';
  var ctx=log.slice(-4).map(function(m){return (m.speaker==='doctor'?'Doctor(KO)':'Patient('+L.label+')')+': '+m.original+' → '+m.translated}).join('\n');
  var srcLang=who==='doctor'?'ko':L.code;
  var matched=matchTerms(text,srcLang);
  try{
    var res=await fetch('/api/translate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text,speaker:who,langCode:L.code,context:ctx||undefined,terms:matched.length?matched:undefined})});
    var data=await res.json();if(data.error)throw new Error(data.error);
    var warn=data.warn||data.translated.startsWith('⚠️');
    var now=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',hour12:false});
    var msg={speaker:who,original:text,translated:data.translated,time:now,src:src,tgt:tgt,warn:warn};
    msgs.push(msg);log.push(msg);rmSt();render();speak(data.translated,tgt,who);
  }catch(e){
    var now2=new Date().toLocaleTimeString('ko',{hour:'2-digit',minute:'2-digit',hour12:false});
    msgs.push({speaker:who,original:text,translated:'⚠️ 번역 실패',time:now2,src:src,tgt:tgt});rmSt();render();
  }
  busy=false;updMic();
}

function toggleMode(){mode=mode==='v'?'t':'v';document.getElementById('VU').style.display=mode==='v'?'flex':'none';document.getElementById('TU').style.display=mode==='t'?'flex':'none';document.getElementById('MB').textContent=mode==='v'?'⌨️ 텍스트':'🎤 음성'}
function sendText(who){var i=document.getElementById('TI'),t=i.value.trim();if(!t||busy)return;i.value='';translate(t,who)}

function setV(who,g){
  if(who==='doc'){vgDoc=g;document.getElementById('DF').className='ob'+(g==='f'?' s':'');document.getElementById('DM').className='ob'+(g==='m'?' s':'')}
  else{vgPat=g;document.getElementById('PF').className='ob'+(g==='f'?' s':'');document.getElementById('PM').className='ob'+(g==='m'?' s':'')}
}
function setF(s){fs=s;document.getElementById('FS').className='ob'+(s==='s'?' s':'');document.getElementById('FM').className='ob'+(s==='m'?' s':'');document.getElementById('FL').className='ob'+(s==='l'?' s':'');render()}
function copyAll(){var t=msgs.map(function(m){return (m.speaker==='doctor'?'🩺':'👤')+' ['+m.time+']\n'+m.original+'\n→ '+m.translated}).join('\n\n');navigator.clipboard&&navigator.clipboard.writeText(t).then(function(){var b=document.getElementById('CP');b.textContent='✅ 복사 완료!';setTimeout(function(){b.textContent='📋 대화 내역 복사 / Copy conversation'},2000)})}
